<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Unlim8ted - Talk to Meatball</title>
  <meta name="description" content="Direct line to Meatball. Subject finding, follow-up rewriting, topic routing, and specialized answer banks." />

  <script type="module" src="/components/site-navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

  <link rel="stylesheet" href="/products/ai/meatball/resources/css/meatball-renderer.css" />

  <style>
    :root {
      --bg: #091019;
      --panel: rgba(255, 255, 255, 0.07);
      --line: rgba(255, 255, 255, 0.12);
      --text: rgba(244, 247, 255, 0.94);
      --muted: rgba(244, 247, 255, 0.68);
      --accent: #ffb46a;
      --accent-2: #62d6ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      --page-pad-x: clamp(10px, 2.5vw, 28px);
      --nav-space: clamp(64px, 9vh, 92px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(960px 520px at 10% 0%, rgba(255, 180, 106, 0.18), transparent 58%),
        radial-gradient(760px 500px at 100% 12%, rgba(98, 214, 255, 0.18), transparent 56%),
        linear-gradient(180deg, #101823 0%, var(--bg) 100%);
    }

    button,
    textarea {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(1080px, calc(100% - var(--page-pad-x) * 2));
      height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      margin: 0 auto;
      padding: calc(var(--nav-space) + env(safe-area-inset-top, 0px)) 0 calc(14px + env(safe-area-inset-bottom, 0px));
      display: grid;
      overflow: hidden;
    }

    .hero {
      min-height: 0;
      height: 100%;
      max-height: 100%;
      display: grid;
      overflow: hidden;
      grid-template-columns: minmax(0, 1.1fr) minmax(250px, 0.9fr);
      gap: clamp(12px, 1.7vw, 18px);
      align-items: stretch;
      transform: translateY(clamp(-55px, -6vh, -24px));
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: clamp(20px, 3vw, 28px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .intro {
      min-height: 0;
      padding: clamp(14px, 2.7vh, 24px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: -40px auto auto -60px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 180, 106, 0.28), transparent 66%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 clamp(6px, 1.2vh, 12px);
      font-size: clamp(2rem, 5.2vw, 4rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .sub {
      max-width: 34rem;
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.88rem, 1.65vh, 1.02rem);
      line-height: 1.45;
    }

    .aboutLink {
      position: relative;
      z-index: 2;
      display: inline-flex;
      width: fit-content;
      margin-top: 14px;
      color: var(--accent-2);
      font-weight: 900;
      text-decoration: none;
      border: 1px solid rgba(98, 214, 255, 0.22);
      background: rgba(98, 214, 255, 0.08);
      padding: 10px 14px;
      border-radius: 999px;
    }

    .aboutLink:hover {
      border-color: rgba(98, 214, 255, 0.42);
      background: rgba(98, 214, 255, 0.14);
    }

    .meatballStage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 0;
      overflow: hidden;
      border: 0;
      background: none;
      box-shadow: none;
      backdrop-filter: none;
    }

    #bigMeatballMount {
      width: 100%;
      height: auto;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .chatShell {
      min-height: 0;
      flex: 1;
      margin-top: clamp(10px, 2vh, 18px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: clamp(10px, 1.8vh, 16px);
      padding: clamp(12px, 2.2vh, 18px);
      overflow: hidden;
    }

    .chatLog {
      min-height: 0;
      height: 100%;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding: clamp(12px, 2vh, 18px);
      border-radius: clamp(18px, 2.5vw, 22px);
      border: 1px solid var(--line);
      background: rgba(7, 13, 20, 0.72);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      flex: 0 0 auto;
      max-width: min(520px, 100%);
      min-width: 0;
      padding: clamp(11px, 1.6vw, 14px) clamp(12px, 1.8vw, 16px);
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .msg.bot {
      background: rgba(255, 180, 106, 0.12);
      border: 1px solid rgba(255, 180, 106, 0.2);
      max-height: clamp(120px, 30dvh, 280px);
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
    }

    .msg.user {
      align-self: flex-end;
      margin-left: auto;
      background: rgba(98, 214, 255, 0.1);
      border: 1px solid rgba(98, 214, 255, 0.18);
      color: rgba(238, 247, 255, 0.92);
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
    }

    .composer textarea {
      width: 100%;
      min-width: 0;
      min-height: clamp(54px, 10vh, 76px);
      max-height: 24vh;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 16px;
      font: inherit;
      outline: none;
    }

    .composer textarea:focus {
      border-color: rgba(98, 214, 255, 0.42);
      box-shadow: 0 0 0 4px rgba(98, 214, 255, 0.08);
    }

    .composer textarea:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    .composer button {
      width: 136px;
      min-width: 0;
      height: 52px;
      align-self: start;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffba74, #d98a3b);
      color: #24130d;
      font: inherit;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      opacity: 1;
    }

    .composer button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .controlRow {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    .modelPanel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: end;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.045);
    }

    .modelCopy {
      min-width: 0;
    }

    .modelLabel {
      margin: 0 0 4px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modelMeta {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .loadingPanel {
      display: grid;
      gap: 8px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.045);
    }

    .chatLoadingPanel {
      width: min(100%, 420px);
      align-self: flex-start;
      border-color: rgba(255, 180, 106, 0.18);
      background: rgba(255, 180, 106, 0.08);
      max-height: none;
      overflow: visible;
      white-space: normal;
    }

    .chatLoadingPanel .modelLabel,
    .chatLoadingPanel .modelMeta {
      white-space: normal;
    }

    .loadingBar {
      position: relative;
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(7, 13, 20, 0.78);
    }

    .loadingBar[hidden] {
      display: none;
    }

    .loadingBarFill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(255, 180, 106, 0.86), rgba(98, 214, 255, 0.94) 55%, rgba(255, 240, 207, 0.95));
      box-shadow:
        0 0 18px rgba(98, 214, 255, 0.24),
        0 0 28px rgba(255, 180, 106, 0.18);
      transition: width 180ms ease;
    }

    .loadingBar.is-indeterminate .loadingBarFill {
      width: 42%;
      animation: loadingSweep 1.05s cubic-bezier(.55, .08, .31, .96) infinite;
    }

    @keyframes loadingSweep {
      0% {
        transform: translateX(-115%);
      }
      100% {
        transform: translateX(255%);
      }
    }

    .modelSelect {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(7, 13, 20, 0.72);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    .modelSelect:focus {
      border-color: rgba(98, 214, 255, 0.42);
      box-shadow: 0 0 0 4px rgba(98, 214, 255, 0.08);
    }

    .noteRow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .note {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .note.good {
      color: rgba(157, 255, 191, 0.9);
      border-color: rgba(157, 255, 191, 0.22);
      background: rgba(157, 255, 191, 0.06);
    }

    .note.bad {
      color: rgba(255, 120, 120, 0.9);
      border-color: rgba(255, 120, 120, 0.22);
      background: rgba(255, 120, 120, 0.06);
    }

    .debugPanel {
      max-height: 24vh;
      overflow: auto;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      background: rgba(0,0,0,0.22);
      color: rgba(244, 247, 255, 0.62);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: none;
    }

    .debugPanel.show {
      display: block;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 0.72fr);
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.4rem);
      }
    }

    @media (max-width: 860px) {
      :root {
        --page-pad-x: clamp(10px, 3vw, 18px);
        --nav-space: 74px;
      }

      html,
      body {
        height: auto;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .page {
        height: auto;
        min-height: 100dvh;
        max-height: none;
        display: grid;
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        overflow: visible;
      }

      .hero {
        height: auto;
        min-height: 0;
        max-height: none;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 12px;
        align-items: stretch;
        overflow: visible;
        transform: none;
      }

      .intro {
        height: auto;
        min-height: 0;
      }

      .meatballStage {
        height: auto;
        padding: 10px;
      }

      .composer textarea {
        min-height: 54px;
        max-height: 120px;
      }

      .composer button {
        width: 90px;
        height: 54px;
      }
    }

    @media (max-width: 600px) {
      :root {
        --page-pad-x: 10px;
        --nav-space: 68px;
      }

      .page {
        width: calc(100% - 20px);
      }

      .intro {
        padding: 14px;
        border-radius: 22px;
      }

      h1 {
        font-size: clamp(2rem, 12vw, 3rem);
        letter-spacing: -0.055em;
      }

      .sub {
        font-size: 0.9rem;
        line-height: 1.38;
      }

      .aboutLink {
        margin-top: 10px;
        padding: 9px 12px;
        font-size: 0.86rem;
      }

      .chatShell {
        margin-top: 12px;
        padding: 10px;
        gap: 10px;
        min-height: 0;
      }

      .chatLog {
        padding: 10px;
        gap: 10px;
      }

      .msg.bot {
        max-height: clamp(110px, 28dvh, 220px);
      }

      .msg {
        max-width: 92%;
        font-size: 0.95rem;
        line-height: 1.42;
      }

      .composer {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .composer textarea {
        min-height: 52px;
        max-height: 130px;
        padding: 13px 14px;
        font-size: 16px;
      }

      .composer button {
        width: 100%;
        height: 48px;
        border-radius: 16px;
      }

      .meatballStage {
        min-height: 0;
        border-radius: 22px;
      }

    }

    @media (max-width: 390px) {
      .sub {
        display: none;
      }

      .chatShell {
        margin-top: 10px;
      }

      .msg {
        max-width: 96%;
        font-size: 0.92rem;
      }

      .meatballStage {
        min-height: 0;
      }
    }

    @media (max-height: 720px) {
      :root {
        --nav-space: 66px;
      }

      .page {
        padding-top: calc(var(--nav-space) + env(safe-area-inset-top, 0px));
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      }

      .hero {
        transform: none;
      }

      h1 {
        font-size: clamp(1.75rem, 4.8vw, 3.2rem);
      }

      .sub {
        font-size: 0.86rem;
        line-height: 1.35;
      }

      .chatShell {
        margin-top: 8px;
        gap: 8px;
        padding: 12px;
      }

      .msg {
        padding: 10px 12px;
        line-height: 1.35;
      }

      .msg.bot {
        max-height: clamp(100px, 26dvh, 200px);
      }
    }

    @media (max-height: 620px) and (min-width: 861px) {
      .sub {
        display: none;
      }

      .hero {
        gap: 10px;
      }

      .composer textarea {
        min-height: 48px;
        max-height: 48px;
      }

      .composer button {
        height: 48px;
      }

      .msg.bot {
        max-height: clamp(90px, 22dvh, 160px);
      }
    }

    @media (max-width: 860px) and (max-height: 560px) and (orientation: landscape) {
      .page {
        padding-top: calc(58px + env(safe-area-inset-top, 0px));
      }

      .hero {
        grid-template-columns: minmax(0, 1fr) minmax(150px, 0.38fr);
        grid-template-rows: 1fr;
      }

      .meatballDisplay {
        --meatball-size: clamp(72px, 15vw, 100px);
        width: min(170px, 34vw);
      }

      .sub {
        display: none;
      }
    }

    .intro,
    .chatShell,
    .chatLog {
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
    }

    @media (max-width: 860px) {
      .intro,
      .chatShell {
        max-height: none;
        overflow: visible;
      }
    }

    .chatLog {
      overflow-y: auto;
    }

    .msg.bot {
      display: block;
      max-height: clamp(96px, 28dvh, 280px);
      overflow-y: auto;
      overflow-x: hidden;
      contain: content;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <site-navbar cart-href="/cart" signin-href="https://unlim8ted.com/sign-in" profile-href="https://unlim8ted.com/profile"></site-navbar>

  <main class="page">
    <section class="hero">
      <section class="panel intro">
        <h1>A smarter Meatball</h1>
        <a class="aboutLink" href="about">Click to find out how it works</a>

        <div class="chatShell">
          <div id="chatLog" class="chatLog" aria-label="Conversation log">
            <div class="msg bot">Loading Meatball.</div>
            <div id="loadingPanel" class="msg bot loadingPanel chatLoadingPanel" aria-live="polite" hidden>
              <p class="modelLabel">Runtime status</p>
              <p id="modelMeta" class="modelMeta">Models stay asleep until you talk to Meatball.</p>
              <div id="loadingBar" class="loadingBar" hidden aria-hidden="true">
                <div id="loadingBarFill" class="loadingBarFill"></div>
              </div>
            </div>
          </div>

          <form id="chatForm" class="composer" aria-label="Meatball chat composer">
            <textarea id="chatInput" disabled placeholder="Loading Meatball models..."></textarea>
            <button id="sendButton" type="submit" disabled>Send</button>
          </form>

          <div id="debugPanel" class="debugPanel" aria-label="Debug output"></div>
        </div>
      </section>

      <aside class="panel meatballStage">
        <div id="bigMeatballMount" aria-hidden="true"></div>
      </aside>
    </section>
  </main>


  <script src="/products/ai/meatball/resources/js/meatball-renderer.js"></script>
  <script>
    window.MeatballEmotionRenderer.mount("#bigMeatballMount");
  </script>
  <script src="/products/ai/meatball/resources/js/meatball-chat-app-new.js"></script>
</body>
</html>
