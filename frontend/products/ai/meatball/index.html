<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Unlim8ted - Talk to Meatball</title>
  <meta name="description" content="Direct line to Meatball. Browser ONNX chunk-model chatbot." />

  <script type="module" src="/components/site-navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

  <link rel="stylesheet" href="../../resources/css/meatball-assistant.css" />

  <style>
    :root {
      --bg: #091019;
      --panel: rgba(255, 255, 255, 0.07);
      --line: rgba(255, 255, 255, 0.12);
      --text: rgba(244, 247, 255, 0.94);
      --muted: rgba(244, 247, 255, 0.68);
      --accent: #ffb46a;
      --accent-2: #62d6ff;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      --page-pad-x: clamp(10px, 2.5vw, 28px);
      --nav-space: clamp(64px, 9vh, 92px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(960px 520px at 10% 0%, rgba(255, 180, 106, 0.18), transparent 58%),
        radial-gradient(760px 500px at 100% 12%, rgba(98, 214, 255, 0.18), transparent 56%),
        linear-gradient(180deg, #101823 0%, var(--bg) 100%);
    }

    button,
    textarea {
      -webkit-tap-highlight-color: transparent;
    }

    .page {
      width: min(1080px, calc(100% - var(--page-pad-x) * 2));
      height: 100vh;
      height: 100dvh;
      max-height: 100dvh;
      margin: 0 auto;
      padding: calc(var(--nav-space) + env(safe-area-inset-top, 0px)) 0 calc(14px + env(safe-area-inset-bottom, 0px));
      display: grid;
      overflow: hidden;
    }

    .hero {
      min-height: 0;
      height: 100%;
      max-height: 100%;
      display: grid;
      overflow: hidden;
      grid-template-columns: minmax(0, 1.1fr) minmax(250px, 0.9fr);
      gap: clamp(12px, 1.7vw, 18px);
      align-items: stretch;
      transform: translateY(clamp(-55px, -6vh, -24px));
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: clamp(20px, 3vw, 28px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .intro {
      min-height: 0;
      padding: clamp(14px, 2.7vh, 24px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: -40px auto auto -60px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 180, 106, 0.28), transparent 66%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 clamp(6px, 1.2vh, 12px);
      font-size: clamp(2rem, 5.2vw, 4rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .sub {
      max-width: 34rem;
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.88rem, 1.65vh, 1.02rem);
      line-height: 1.45;
    }

    .aboutLink {
      position: relative;
      z-index: 2;
      display: inline-flex;
      width: fit-content;
      margin-top: 14px;
      color: var(--accent-2);
      font-weight: 900;
      text-decoration: none;
      border: 1px solid rgba(98, 214, 255, 0.22);
      background: rgba(98, 214, 255, 0.08);
      padding: 10px 14px;
      border-radius: 999px;
    }

    .aboutLink:hover {
      border-color: rgba(98, 214, 255, 0.42);
      background: rgba(98, 214, 255, 0.14);
    }

    .meatballStage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(12px, 2.5vh, 22px);
      overflow: hidden;
    }

    .meatballDisplay {
      --meatball-size: clamp(118px, 18vw, 178px);
      position: relative;
      width: min(320px, 78vw, 100%);
      max-height: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: clamp(24px, 4vw, 34px);
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.12), transparent 20%),
        radial-gradient(circle at 76% 74%, rgba(255, 180, 106, 0.15), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .meatballDisplay::before {
      content: "";
      position: absolute;
      inset: auto 22px 20px;
      height: 22px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.28);
      filter: blur(12px);
    }

    .chatShell {
      min-height: 0;
      flex: 1;
      margin-top: clamp(10px, 2vh, 18px);
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: clamp(10px, 1.8vh, 16px);
      padding: clamp(12px, 2.2vh, 18px);
      overflow: hidden;
    }

    .chatLog {
      min-height: 0;
      height: 100%;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding: clamp(12px, 2vh, 18px);
      border-radius: clamp(18px, 2.5vw, 22px);
      border: 1px solid var(--line);
      background: rgba(7, 13, 20, 0.72);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      flex: 0 0 auto;
      max-width: min(520px, 100%);
      min-width: 0;
      padding: clamp(11px, 1.6vw, 14px) clamp(12px, 1.8vw, 16px);
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .msg.bot {
      background: rgba(255, 180, 106, 0.12);
      border: 1px solid rgba(255, 180, 106, 0.2);
      max-height: clamp(120px, 30dvh, 280px);
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
    }

    .msg.user {
      align-self: flex-end;
      margin-left: auto;
      background: rgba(98, 214, 255, 0.1);
      border: 1px solid rgba(98, 214, 255, 0.18);
      color: rgba(238, 247, 255, 0.92);
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
    }

    .composer textarea {
      width: 100%;
      min-width: 0;
      min-height: clamp(54px, 10vh, 76px);
      max-height: 24vh;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 16px;
      font: inherit;
      outline: none;
    }

    .composer textarea:focus {
      border-color: rgba(98, 214, 255, 0.42);
      box-shadow: 0 0 0 4px rgba(98, 214, 255, 0.08);
    }

    .composer textarea:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    .composer button {
      width: 136px;
      min-width: 0;
      height: 52px;
      align-self: start;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffba74, #d98a3b);
      color: #24130d;
      font: inherit;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      opacity: 1;
    }

    .composer button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .debugPanel {
      max-height: 24vh;
      overflow: auto;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      background: rgba(0,0,0,0.22);
      color: rgba(244, 247, 255, 0.62);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: none;
    }

    .debugPanel.show {
      display: block;
    }

    .meatballDisplay .meatballAvatar {
      width: var(--meatball-size);
      height: var(--meatball-size);
      cursor: default;
      pointer-events: none;
    }

    .meatballDisplay .meatballAvatar-shadow {
      left: 18px;
      right: 18px;
      bottom: 10px;
      height: 18px;
      filter: blur(10px);
    }

    .meatballDisplay .meatballAvatar-body {
      animation-duration: 3.6s;
    }

    .meatballDisplay .meatballAvatar-eye {
      top: 30.95%;
      width: clamp(14px, 19.05%, 28px);
      height: clamp(14px, 19.05%, 28px);
      z-index: 4;
    }

    .meatballDisplay .meatballAvatar-eye.left {
      left: 26.19%;
    }

    .meatballDisplay .meatballAvatar-eye.right {
      right: 26.19%;
    }

    .meatballDisplay .meatballAvatar-eye .pupil {
      width: clamp(7px, 9.52%, 13px);
      height: clamp(7px, 9.52%, 13px);
      transform: translate(-50%, -50%);
    }

    .meatballDisplay .meatballAvatar-mouth {
      bottom: 20.24%;
      width: clamp(24px, 35.71%, 44px);
      height: clamp(11px, 16.67%, 20px);
      z-index: 3;
      transform-origin: 50% 50%;
    }

    .meatballDisplay .meatballAvatar.talking .meatballAvatar-mouth {
      animation: meatballTalk 0.18s infinite steps(2, end);
    }

    @keyframes meatballTalk {
      0% {
        width: clamp(24px, 22%, 36px);
        height: clamp(9px, 8%, 14px);
        border-radius: 999px 999px 10px 10px;
        transform: translateX(-50%) scaleY(0.82);
      }

      50% {
        width: clamp(28px, 27%, 42px);
        height: clamp(13px, 14%, 22px);
        border-radius: 50% 50% 44% 44%;
        transform: translateX(-50%) scaleY(1.04);
      }

      100% {
        width: clamp(25px, 24%, 38px);
        height: clamp(10px, 10%, 16px);
        border-radius: 999px 999px 12px 12px;
        transform: translateX(-50%) scaleY(0.9);
      }
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 0.72fr);
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.4rem);
      }
    }

    @media (max-width: 860px) {
      :root {
        --page-pad-x: clamp(10px, 3vw, 18px);
        --nav-space: 74px;
      }

      .page {
        height: 100dvh;
        max-height: 100dvh;
        display: grid;
        padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        overflow: hidden;
      }

      .hero {
        height: 100%;
        min-height: 0;
        max-height: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) clamp(132px, 24dvh, 190px);
        gap: 12px;
        align-items: stretch;
        overflow: hidden;
        transform: none;
      }

      .intro {
        height: 100%;
      }

      .meatballStage {
        height: 100%;
        padding: 10px;
      }

      .meatballDisplay {
        --meatball-size: clamp(86px, 23vw, 124px);
        width: min(220px, 58vw);
      }

      .chatShell {
        min-height: 360px;
      }

      .composer textarea {
        min-height: 54px;
        max-height: 120px;
      }

      .composer button {
        width: 90px;
        height: 54px;
      }
    }

    @media (max-width: 600px) {
      :root {
        --page-pad-x: 10px;
        --nav-space: 68px;
      }

      .page {
        width: calc(100% - 20px);
      }

      .intro {
        padding: 14px;
        border-radius: 22px;
      }

      h1 {
        font-size: clamp(2rem, 12vw, 3rem);
        letter-spacing: -0.055em;
      }

      .sub {
        font-size: 0.9rem;
        line-height: 1.38;
      }

      .aboutLink {
        margin-top: 10px;
        padding: 9px 12px;
        font-size: 0.86rem;
      }

      .chatShell {
        margin-top: 12px;
        padding: 10px;
        gap: 10px;
        min-height: 0;
      }

      .chatLog {
        padding: 10px;
        gap: 10px;
      }

      .msg.bot {
        max-height: clamp(110px, 28dvh, 220px);
      }

      .msg {
        max-width: 92%;
        font-size: 0.95rem;
        line-height: 1.42;
      }

      .composer {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .composer textarea {
        min-height: 52px;
        max-height: 130px;
        padding: 13px 14px;
        font-size: 16px;
      }

      .composer button {
        width: 100%;
        height: 48px;
        border-radius: 16px;
      }

      .meatballStage {
        min-height: 136px;
        border-radius: 22px;
      }

      .meatballDisplay {
        --meatball-size: clamp(78px, 25vw, 108px);
        width: min(190px, 62vw);
      }
    }

    @media (max-width: 390px) {
      .sub {
        display: none;
      }

      .chatShell {
        margin-top: 10px;
      }

      .msg {
        max-width: 96%;
        font-size: 0.92rem;
      }

      .meatballStage {
        min-height: 124px;
      }
    }

    @media (max-height: 720px) {
      :root {
        --nav-space: 66px;
      }

      .page {
        padding-top: calc(var(--nav-space) + env(safe-area-inset-top, 0px));
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      }

      .hero {
        transform: none;
      }

      h1 {
        font-size: clamp(1.75rem, 4.8vw, 3.2rem);
      }

      .sub {
        font-size: 0.86rem;
        line-height: 1.35;
      }

      .chatShell {
        margin-top: 8px;
        gap: 8px;
        padding: 12px;
      }

      .msg {
        padding: 10px 12px;
        line-height: 1.35;
      }

      .msg.bot {
        max-height: clamp(100px, 26dvh, 200px);
      }
    }

    @media (max-height: 620px) and (min-width: 861px) {
      .sub {
        display: none;
      }

      .hero {
        gap: 10px;
      }

      .composer textarea {
        min-height: 48px;
        max-height: 48px;
      }

      .composer button {
        height: 48px;
      }

      .msg.bot {
        max-height: clamp(90px, 22dvh, 160px);
      }
    }

    @media (max-width: 860px) and (max-height: 560px) and (orientation: landscape) {
      .page {
        padding-top: calc(58px + env(safe-area-inset-top, 0px));
      }

      .hero {
        grid-template-columns: minmax(0, 1fr) minmax(150px, 0.38fr);
        grid-template-rows: 1fr;
      }

      .meatballDisplay {
        --meatball-size: clamp(72px, 15vw, 100px);
        width: min(170px, 34vw);
      }

      .sub {
        display: none;
      }
    }

    .intro,
    .chatShell,
    .chatLog {
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
    }

    .chatLog {
      overflow-y: auto;
    }

    .msg.bot {
      display: block;
      max-height: clamp(96px, 28dvh, 280px);
      overflow-y: auto;
      overflow-x: hidden;
      contain: content;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <site-navbar cart-href="/cart" signin-href="https://unlim8ted.com/sign-in" profile-href="https://unlim8ted.com/profile"></site-navbar>

  <main class="page">
    <section class="hero">
      <section class="panel intro">
        <h1>A smarter Meatball</h1>
        <p class="sub">
          Meatball uses subject models, a topic selector, and specialized ONNX chunk models. The sauce is on.
        </p>

        <a class="aboutLink" href="about">Click to Learn About the Meatball AI</a>

        <div class="chatShell">
          <div id="chatLog" class="chatLog" aria-label="Conversation log">
            <div class="msg bot">Loading Meatball.</div>
          </div>

          <form id="chatForm" class="composer" aria-label="Meatball chat composer">
            <textarea id="chatInput" disabled placeholder="Loading Meatball models..."></textarea>
            <button id="sendButton" type="submit" disabled>Send</button>
          </form>

          <div id="debugPanel" class="debugPanel" aria-label="Debug output"></div>
        </div>
      </section>

      <aside class="panel meatballStage">
        <div class="meatballDisplay" aria-hidden="true">
          <div id="bigMeatballAvatar" class="meatballAvatar">
            <span class="meatballAvatar-shadow"></span>
            <span class="meatballAvatar-body">
              <span class="meatballAvatar-eye left"><span class="pupil"></span></span>
              <span class="meatballAvatar-eye right"><span class="pupil"></span></span>
              <span class="meatballAvatar-mouth"></span>
            </span>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const INPUT_NGRAMS = [1, 2, 3];

    const PAD_ID = 0;
    const BOS_ID = 1;
    const EOS_ID = 2;
    const UNK_ID = 3;

    const MODEL_PATHS = {
      base: "/assets/models/specialized_meatball_chunks",

      selectorModel: "/assets/models/specialized_meatball_chunks/selector.onnx",
      selectorVocab: "/assets/models/specialized_meatball_chunks/selector_vocab.json",
      selectorLabels: "/assets/models/specialized_meatball_chunks/selector_labels.json",

      subjectFinderModel: "/assets/models/subject_finder/subject_finder.onnx",
      subjectFinderConfig: "/assets/models/subject_finder/config.json",
      subjectFinderVocab: "/assets/models/subject_finder/vocab.json",
      subjectFinderLabels: "/assets/models/subject_finder/labels.json",

      subjectInserterModel: "/assets/models/subject_inserter/subject_inserter.onnx",
      subjectInserterConfig: "/assets/models/subject_inserter/config.json",
      subjectInserterLabels: "/assets/models/subject_inserter/labels.json",
      subjectInserterVocab: "/assets/models/subject_inserter/vocab.json",

      topicsBase: "/assets/models/specialized_meatball_chunks/topics"
    };

    const DEBUG_ENABLED = new URLSearchParams(location.search).has("debug");

    const chatLog = document.getElementById("chatLog");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const sendButton = document.getElementById("sendButton");
    const debugPanel = document.getElementById("debugPanel");
    const bigMeatballAvatar = document.getElementById("bigMeatballAvatar");

    let selectorRuntime = null;
    let subjectFinderRuntime = null;
    let subjectInserterRuntime = null;
    let topicRuntimeCache = new Map();
    let talkTimer = null;

    let memory = {
      lastSubject: "",
      lastTopic: "",
      lastQuestion: "",
      lastAnswer: "",
      history: []
    };

    function getTopicPaths(topic) {
      return {
        model: `${MODEL_PATHS.topicsBase}/${topic}/model.onnx`,
        config: `${MODEL_PATHS.topicsBase}/${topic}/config.json`,
        inputVocab: `${MODEL_PATHS.topicsBase}/${topic}/input_vocab.json`,
        outputChunks: `${MODEL_PATHS.topicsBase}/${topic}/output_chunks.json`
      };
    }

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;
      msg.textContent = text;
      chatLog.appendChild(msg);
      chatLog.scrollTop = chatLog.scrollHeight;

      if (role === "bot") {
        animateMeatballTalk(text);
      }
    }

    function setMeatballTalking(isTalking) {
      if (!bigMeatballAvatar) return;
      bigMeatballAvatar.classList.toggle("talking", Boolean(isTalking));
    }

    function animateMeatballTalk(text) {
      if (talkTimer) window.clearTimeout(talkTimer);

      const talkDuration = Math.min(
        4200,
        Math.max(900, String(text || "").length * 42)
      );

      setMeatballTalking(true);

      talkTimer = window.setTimeout(() => {
        setMeatballTalking(false);
        talkTimer = null;
      }, talkDuration);
    }

    function setDebug(data) {
      if (!DEBUG_ENABLED) return;
      debugPanel.classList.add("show");
      debugPanel.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${url} failed with ${res.status}`);
      return await res.json();
    }

    async function createSession(url) {
      return await ort.InferenceSession.create(url, {
        executionProviders: ["wasm"]
      });
    }

    async function runSession(session, inputs) {
      return await session.run(inputs);
    }

    async function runSessionWithFirstInput(session, tensor) {
      const inputName = session.inputNames?.[0] || "input";
      return await session.run({ [inputName]: tensor });
    }

    function firstOutput(outputs) {
      const key = Object.keys(outputs)[0];
      return outputs[key];
    }

    function labelsFromIndexObject(data) {
      if (Array.isArray(data)) return data;
      if (!data || typeof data !== "object") return [];

      return Object.keys(data)
        .sort((a, b) => Number(a) - Number(b))
        .map(key => data[key]);
    }

    function inputNormalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/\n/g, " ")
        .replace(/[^a-z0-9_!?.,' -]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function inputTokenize(text) {
      const clean = inputNormalize(text);
      if (!clean) return [];
      return clean.split(/\s+/).filter(Boolean);
    }

    function makeInputNgrams(tokens, ngrams = INPUT_NGRAMS) {
      const feats = [];

      for (const n of ngrams) {
        if (tokens.length < n) continue;

        for (let i = 0; i <= tokens.length - n; i++) {
          feats.push(tokens.slice(i, i + n).join("_"));
        }
      }

      return feats;
    }

    function rowToInputText(question, history = []) {
      const historyText = Array.isArray(history)
        ? history.map(x => String(x)).join(" ")
        : String(history || "");

      return `question: ${question} history: ${historyText}`;
    }

    function selectorTextFromQuestion(question) {
      return `question: ${question}`;
    }

    function vectorizeText(text, vocab) {
      const tokens = inputTokenize(text);
      const feats = makeInputNgrams(tokens);
      const size = Object.keys(vocab || {}).length;
      const x = new Float32Array(size);
      const counts = new Map();

      for (const feat of feats) {
        counts.set(feat, (counts.get(feat) || 0) + 1);
      }

      const unk = typeof vocab["<UNK>"] === "number" ? vocab["<UNK>"] : UNK_ID;

      for (const [feat, count] of counts.entries()) {
        const idx = typeof vocab[feat] === "number" ? vocab[feat] : unk;
        if (idx >= 0 && idx < x.length) {
          x[idx] = Math.min(Number(count), 5.0);
        }
      }

      return x;
    }

    function vectorizeSelectorQuestion(question, selectorVocab) {
      return vectorizeText(selectorTextFromQuestion(question), selectorVocab);
    }

    function vectorizeTopicQuestion(question, inputVocab, history = []) {
      return vectorizeText(rowToInputText(question, history), inputVocab);
    }

    function softmax(arr) {
      const max = Math.max(...arr);
      const exp = arr.map(x => Math.exp(x - max));
      const sum = exp.reduce((a, b) => a + b, 0) || 1;
      return exp.map(x => x / sum);
    }

    function joinChunkTexts(chunks) {
      let out = "";

      for (let chunk of chunks) {
        chunk = String(chunk || "").trim();

        if (!chunk) continue;

        if ([".", ",", "!", "?", ":", ";", "%", ")", "]", "}"].includes(chunk)) {
          out = out.trimEnd() + chunk;
        } else if (["(", "[", "{"].includes(chunk)) {
          if (out && !out.endsWith(" ")) out += " ";
          out += chunk;
        } else if (chunk.startsWith("'") || chunk.startsWith("’")) {
          out = out.trimEnd() + chunk;
        } else {
          if (out && !out.endsWith(" ") && !out.endsWith("(") && !out.endsWith("[") && !out.endsWith("{") && !out.endsWith("'") && !out.endsWith("’")) {
            out += " ";
          }

          out += chunk;
        }
      }

      return out.replace(/\s+/g, " ").trim();
    }

    function decodeChunkIds(ids, outputChunks) {
      const texts = [];

      for (const rawIdx of ids) {
        const idx = Number(rawIdx);

        if (idx === EOS_ID) break;
        if (idx === PAD_ID || idx === BOS_ID || idx === UNK_ID) continue;

        if (idx >= 0 && idx < outputChunks.length) {
          const chunk = outputChunks[idx];
          const text = typeof chunk === "string" ? chunk : chunk.text;
          texts.push(text);
        }
      }

      return joinChunkTexts(texts);
    }

    function normalizeAction(action) {
      return String(action || "")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, "_");
    }

    function replacePronounsWithSubject(message, subject) {
      if (!subject) return message;

      let q = String(message || "");

      q = q.replace(/\bthe company\b/gi, subject);
      q = q.replace(/\bthe project\b/gi, subject);
      q = q.replace(/\bthe film\b/gi, subject);
      q = q.replace(/\bthe game\b/gi, subject);
      q = q.replace(/\bit\b/gi, subject);
      q = q.replace(/\bthat\b/gi, subject);
      q = q.replace(/\bthis\b/gi, subject);

      return q.replace(/\s+/g, " ").trim();
    }

    function applySubjectInsertAction(message, subject, prediction) {
      const action = normalizeAction(prediction?.action);

      if (!subject || action === "no_rewrite" || action === "already_standalone") {
        return String(message || "").trim();
      }

      if (
        action.includes("replace") ||
        action.includes("pronoun") ||
        action.includes("company") ||
        action.includes("it") ||
        action.includes("that") ||
        action.includes("this")
      ) {
        return replacePronounsWithSubject(message, subject);
      }

      if (
        action.includes("append") ||
        action.includes("about") ||
        action.includes("add_subject")
      ) {
        return `${String(message || "").trim()} about ${subject}`.trim();
      }

      return replacePronounsWithSubject(message, subject);
    }

    async function predictSubject(text) {
      if (!subjectFinderRuntime) {
        return {
          subject: memory.lastSubject || "",
          confidence: 0,
          source: "memory"
        };
      }

      try {
        const vocab = subjectFinderRuntime.vocab || {};
        const inputText = rowToInputText(text, memory.history);
        const vec = vectorizeText(inputText, vocab);
        const tensor = new ort.Tensor("float32", vec, [1, vec.length]);
        const outputs = await runSessionWithFirstInput(subjectFinderRuntime.session, tensor);
        const output = firstOutput(outputs);
        const data = Array.from(output.data || []);
        const labels = subjectFinderRuntime.labels || [];

        if (!data.length || !labels.length) {
          return {
            subject: memory.lastSubject || "",
            confidence: 0,
            source: "memory_no_labels"
          };
        }

        const probs = softmax(data);
        const bestIdx = probs.indexOf(Math.max(...probs));
        const subject = labels[bestIdx] || memory.lastSubject || "";

        return {
          subject,
          confidence: probs[bestIdx] || 0,
          source: "model"
        };
      } catch (err) {
        return {
          subject: memory.lastSubject || "",
          confidence: 0,
          source: "memory_after_error",
          error: String(err?.message || err)
        };
      }
    }

    async function predictSubjectInserter(message, subject) {
      if (!subjectInserterRuntime) {
        return {
          action: "already_standalone",
          confidence: 0,
          top: []
        };
      }

      const inputText = `message: ${inputNormalize(message)} subject: ${inputNormalize(subject)}`;
      const vec = vectorizeText(inputText, subjectInserterRuntime.vocab);
      const tensor = new ort.Tensor("float32", vec, [1, vec.length]);
      const outputs = await runSessionWithFirstInput(subjectInserterRuntime.session, tensor);
      const logits = Array.from(firstOutput(outputs).data);
      const probs = softmax(logits);

      const top = probs
        .map((score, index) => ({
          action: subjectInserterRuntime.labels[index] || String(index),
          score
        }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      return {
        action: top[0]?.action || "already_standalone",
        confidence: top[0]?.score || 0,
        top
      };
    }

    async function predictTopic(question) {
      const vec = vectorizeSelectorQuestion(question, selectorRuntime.vocab);
      const tensor = new ort.Tensor("float32", vec, [1, vec.length]);
      const outputs = await runSessionWithFirstInput(selectorRuntime.session, tensor);
      const logits = Array.from(firstOutput(outputs).data);
      const probs = softmax(logits);

      const top = probs
        .map((score, index) => ({
          topic: selectorRuntime.labels[index] || String(index),
          score
        }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

      return {
        topic: top[0]?.topic || "general",
        confidence: top[0]?.score || 0,
        top
      };
    }

    async function loadTopicRuntime(topic) {
      if (topicRuntimeCache.has(topic)) {
        return topicRuntimeCache.get(topic);
      }

      const paths = getTopicPaths(topic);

      const [config, inputVocab, outputChunks, session] = await Promise.all([
        fetchJson(paths.config),
        fetchJson(paths.inputVocab),
        fetchJson(paths.outputChunks),
        createSession(paths.model)
      ]);

      const runtime = {
        topic,
        config,
        inputVocab,
        outputChunks,
        session,
        paths
      };

      topicRuntimeCache.set(topic, runtime);

      return runtime;
    }

    function argmax(arr, start = 0, end = arr.length) {
      let bestIndex = start;
      let bestValue = arr[start];

      for (let i = start + 1; i < end; i++) {
        if (arr[i] > bestValue) {
          bestValue = arr[i];
          bestIndex = i;
        }
      }

      return bestIndex;
    }

    async function predictAnswer(question, topicRuntime) {
      const history = memory.history.slice(-8);
      const vec = vectorizeTopicQuestion(question, topicRuntime.inputVocab, history);
      const tensor = new ort.Tensor("float32", vec, [1, vec.length]);

      const outputs = await runSessionWithFirstInput(topicRuntime.session, tensor);
      const output = firstOutput(outputs);
      const data = Array.from(output.data);
      const dims = output.dims || output.dims_;

      let predIds = [];

      if (dims && dims.length === 3) {
        const seqLen = dims[1];
        const vocabSize = dims[2];

        for (let t = 0; t < seqLen; t++) {
          const start = t * vocabSize;
          const tokenId = argmax(data, start, start + vocabSize);

          if (tokenId === EOS_ID) break;
          if (tokenId === PAD_ID || tokenId === BOS_ID) break;

          predIds.push(tokenId);
        }
      } else if (dims && dims.length === 2) {
        const vocabSize = dims[1];
        const tokenId = argmax(data, 0, vocabSize);
        predIds.push(tokenId);
      } else {
        predIds = data.map(x => Math.round(Number(x))).filter(Number.isFinite);
      }

      const maxOutputChunks =
        Number(topicRuntime.config?.max_output_chunks) ||
        Number(topicRuntime.config?.maxOutputChunks) ||
        40;

      predIds = predIds.slice(0, maxOutputChunks + 1);

      const answer = decodeChunkIds([...predIds, EOS_ID], topicRuntime.outputChunks);

      const chunks = predIds.map(id => {
        const chunk = topicRuntime.outputChunks[id];
        return {
          id,
          text: typeof chunk === "string" ? chunk : chunk?.text || ""
        };
      });

      return {
        answer,
        predIds,
        chunks
      };
    }

    async function getMeatballReply(userText) {
      const subjectPrediction = await predictSubject(userText);
      const subject = subjectPrediction.subject || memory.lastSubject || "";
      const inserterPrediction = await predictSubjectInserter(userText, subject);
      const standaloneQuestion = applySubjectInsertAction(userText, subject, inserterPrediction);

      const topicPrediction = await predictTopic(standaloneQuestion);
      const topicRuntime = await loadTopicRuntime(topicPrediction.topic);
      const answerPrediction = await predictAnswer(standaloneQuestion, topicRuntime);

      const answer = answerPrediction.answer || "";

      memory.lastSubject = subject || topicPrediction.topic || memory.lastSubject || "";
      memory.lastTopic = topicPrediction.topic || "";
      memory.lastQuestion = standaloneQuestion;
      memory.lastAnswer = answer;

      memory.history.push(`User: ${userText}`);
      memory.history.push(`Question: ${standaloneQuestion}`);
      memory.history.push(`Bot: ${answer}`);

      if (memory.history.length > 18) {
        memory.history = memory.history.slice(-18);
      }

      return {
        text: answer,
        debug: {
          original: userText,
          subjectPrediction,
          inserterPrediction,
          standaloneQuestion,
          topicPrediction,
          topicPaths: topicRuntime.paths,
          answerPrediction,
          memory
        }
      };
    }

    async function loadModels() {
      const [
        selectorVocab,
        selectorLabelsRaw,
        selectorSession,
        subjectInserterConfig,
        subjectInserterLabelsRaw,
        subjectInserterVocab,
        subjectInserterSession
      ] = await Promise.all([
        fetchJson(MODEL_PATHS.selectorVocab),
        fetchJson(MODEL_PATHS.selectorLabels),
        createSession(MODEL_PATHS.selectorModel),

        fetchJson(MODEL_PATHS.subjectInserterConfig),
        fetchJson(MODEL_PATHS.subjectInserterLabels),
        fetchJson(MODEL_PATHS.subjectInserterVocab),
        createSession(MODEL_PATHS.subjectInserterModel)
      ]);

      selectorRuntime = {
        session: selectorSession,
        vocab: selectorVocab,
        labels: labelsFromIndexObject(selectorLabelsRaw)
      };

      subjectInserterRuntime = {
        session: subjectInserterSession,
        config: subjectInserterConfig,
        vocab: subjectInserterVocab,
        labels: labelsFromIndexObject(subjectInserterLabelsRaw)
      };

      try {
        const [subjectFinderConfig, subjectFinderVocab, subjectFinderLabelsRaw, subjectFinderSession] = await Promise.all([
          fetchJson(MODEL_PATHS.subjectFinderConfig),
          fetchJson(MODEL_PATHS.subjectFinderVocab),
          fetchJson(MODEL_PATHS.subjectFinderLabels),
          createSession(MODEL_PATHS.subjectFinderModel)
        ]);

        subjectFinderRuntime = {
          session: subjectFinderSession,
          config: subjectFinderConfig,
          vocab: subjectFinderVocab,
          labels: labelsFromIndexObject(subjectFinderLabelsRaw)
        };
      } catch (err) {
        subjectFinderRuntime = null;
        console.warn("Subject finder model not loaded:", err);
      }
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = chatInput.value.trim();

      if (!text) return;

      chatInput.value = "";
      chatInput.disabled = true;
      sendButton.disabled = true;

      addMessage("user", text);

      try {
        const result = await getMeatballReply(text);
        addMessage("bot", result.text || "The Meatball produced an empty chunk answer.");
        setDebug(result.debug);
      } catch (err) {
        console.error(err);
        addMessage("bot", "The sauce broke while answering. Check the browser console.");
        setDebug({
          error: String(err && err.message ? err.message : err),
          paths: MODEL_PATHS
        });
      } finally {
        chatInput.disabled = false;
        sendButton.disabled = false;
        chatInput.focus();
      }
    });

    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        chatForm.requestSubmit();
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        await loadModels();

        chatLog.innerHTML = "";
        addMessage("bot", "I am here. Subject models online. Selector online. Chunk models ready.");

        chatInput.disabled = false;
        sendButton.disabled = false;
        chatInput.placeholder = "Ask Meatball...";

        if (DEBUG_ENABLED) {
          debugPanel.classList.add("show");
          setDebug({
            loaded: true,
            selectorLabels: selectorRuntime.labels,
            subjectInserterLabels: subjectInserterRuntime.labels,
            subjectFinderLoaded: Boolean(subjectFinderRuntime),
            paths: MODEL_PATHS
          });
        }

        chatInput.focus();
      } catch (err) {
        console.error(err);

        chatLog.innerHTML = "";
        addMessage("bot", "My ONNX model files did not load.");

        setDebug({
          loadError: String(err && err.message ? err.message : err),
          paths: MODEL_PATHS
        });
      }
    });
  </script>
