name: Sync Website

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: sync-assets-services-frontend-auth-products
  cancel-in-progress: false

env:
  ASSETS_DIR: assets
  PUBLIC_API_DIR: services
  FRONTEND_DIR: frontend
  AUTH_DIR: auth

  ASSETS_REPO: Unlim8ted-Studio-Productions/assets.unlim8ted.com
  API_REPO: Unlim8ted-Studio-Productions/services.unlim8ted.com
  TARGET_BRANCH: main

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      assets_changed: ${{ steps.changes.outputs.assets_changed }}
      api_changed: ${{ steps.changes.outputs.api_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      auth_changed: ${{ steps.changes.outputs.auth_changed }}
      products_changed: ${{ steps.changes.outputs.products_changed }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${AFTER}~1" >/dev/null 2>&1; then
              BEFORE="$(git rev-parse "${AFTER}~1")"
            else
              BEFORE="${AFTER}"
            fi
          fi

          echo "Diff range: $BEFORE..$AFTER"
          CHANGED="$(git diff --name-only "$BEFORE" "$AFTER" || true)"
          echo "$CHANGED" | sed 's/^/ - /' || true

          assets_changed=false
          api_changed=false
          frontend_changed=false
          auth_changed=false
          products_changed=false

          if echo "$CHANGED" | grep -qE '^assets/'; then
            assets_changed=true
          fi

          if echo "$CHANGED" | grep -qE '^services/'; then
            api_changed=true
          fi

          if echo "$CHANGED" | grep -qE '^frontend/'; then
            frontend_changed=true
          fi

          if echo "$CHANGED" | grep -qE '^auth/'; then
            auth_changed=true
          fi

          if echo "$CHANGED" | grep -qE '^assets/data/products\.json$'; then
            products_changed=true
          fi

          echo "assets_changed=$assets_changed" | tee -a "$GITHUB_OUTPUT"
          echo "api_changed=$api_changed" | tee -a "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" | tee -a "$GITHUB_OUTPUT"
          echo "auth_changed=$auth_changed" | tee -a "$GITHUB_OUTPUT"
          echo "products_changed=$products_changed" | tee -a "$GITHUB_OUTPUT"

  sync:
    name: Sync assets + services
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.assets_changed == 'true' || needs.detect.outputs.api_changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate GitHub App inputs
        shell: bash
        env:
          GH_APP_ID: ${{ vars.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GH_APP_ID:-}" ]; then
            echo "ERROR: vars.GH_APP_ID is not set."
            exit 1
          fi

          if [ -z "${GH_APP_PRIVATE_KEY:-}" ]; then
            echo "ERROR: secrets.GH_APP_PRIVATE_KEY is not set."
            exit 1
          fi

          if ! [[ "${GH_APP_ID}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: vars.GH_APP_ID must be numeric."
            exit 1
          fi

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Unlim8ted-Studio-Productions
          repositories: |
            assets.unlim8ted.com
            services.unlim8ted.com

      - name: Fail if any file > 95MB in assets or services
        shell: bash
        run: |
          set -euo pipefail
          THRESHOLD_BYTES=$((95 * 1024 * 1024))

          check_dir () {
            local DIR="$1"
            if [ -d "$DIR" ]; then
              BIG="$(find "$DIR" -type f -printf '%s %p\n' | awk -v t="$THRESHOLD_BYTES" '$1>t{print}')"
              if [ -n "$BIG" ]; then
                echo "ERROR: Found files too large in '$DIR':"
                echo "$BIG"
                exit 1
              fi
            fi
          }

          if [ "${{ needs.detect.outputs.assets_changed }}" = "true" ]; then
            check_dir "${ASSETS_DIR}"
          fi

          if [ "${{ needs.detect.outputs.api_changed }}" = "true" ]; then
            check_dir "${PUBLIC_API_DIR}"
          fi

      - name: Sync assets repo
        if: needs.detect.outputs.assets_changed == 'true'
        shell: bash
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ env.ASSETS_REPO }}
          BRANCH: ${{ env.TARGET_BRANCH }}
          SRC_DIR: ${{ env.ASSETS_DIR }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          SRC_PATH="${GITHUB_WORKSPACE}/${SRC_DIR}"
          WORKDIR="$(mktemp -d)"
          PUSH_URL="https://x-access-token:${GH_APP_TOKEN}@github.com/${REPO}.git"

          git clone --branch "${BRANCH}" --depth 1 "${PUSH_URL}" "${WORKDIR}/repo"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            "${SRC_PATH}/" "${WORKDIR}/repo/"

          git -C "${WORKDIR}/repo" add -A

          if git -C "${WORKDIR}/repo" diff --cached --quiet; then
            echo "No changes to push to ${REPO}."
            rm -rf "$WORKDIR"
            exit 0
          fi

          git -C "${WORKDIR}/repo" commit -m "Deploy assets from unlim8ted.com (${GITHUB_SHA})"
          git -C "${WORKDIR}/repo" push "${PUSH_URL}" "HEAD:${BRANCH}"
          rm -rf "$WORKDIR"

      - name: Sync services repo
        if: needs.detect.outputs.api_changed == 'true'
        shell: bash
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ env.API_REPO }}
          BRANCH: ${{ env.TARGET_BRANCH }}
          SRC_DIR: ${{ env.PUBLIC_API_DIR }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          SRC_PATH="${GITHUB_WORKSPACE}/${SRC_DIR}"
          WORKDIR="$(mktemp -d)"
          PUSH_URL="https://x-access-token:${GH_APP_TOKEN}@github.com/${REPO}.git"

          git clone --branch "${BRANCH}" --depth 1 "${PUSH_URL}" "${WORKDIR}/repo"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            "${SRC_PATH}/" "${WORKDIR}/repo/"

          git -C "${WORKDIR}/repo" add -A

          if git -C "${WORKDIR}/repo" diff --cached --quiet; then
            echo "No changes to push to ${REPO}."
            rm -rf "$WORKDIR"
            exit 0
          fi

          git -C "${WORKDIR}/repo" commit -m "Deploy services from unlim8ted.com (${GITHUB_SHA})"
          git -C "${WORKDIR}/repo" push "${PUSH_URL}" "HEAD:${BRANCH}"
          rm -rf "$WORKDIR"

  deploy_auth_firebase:
    name: Deploy auth to Firebase Hosting
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.auth_changed == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Firebase service account
        shell: bash
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_UNLIM8TED_DB }}' > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy auth folder to Firebase Hosting
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          set +e
          cd auth
          npm install -g firebase-tools
          firebase deploy --only hosting --project unlim8ted-db 2>&1 | tee deploy.log
          EXIT_CODE=${PIPESTATUS[0]}

          if grep -q "is the current active version" deploy.log; then
            echo "Firebase deploy completed; ignoring duplicate active-version release error."
            exit 0
          fi

          exit $EXIT_CODE

  upload_products_firestore:
    name: Upload products.json to Firestore
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.products_changed == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload products to Firestore
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UNLIM8TED_DB }}
        run: |
          npm install firebase-admin

          node <<'NODE'
          const fs = require("fs");
          const { initializeApp, cert } = require("firebase-admin/app");
          const { getFirestore } = require("firebase-admin/firestore");

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON);

          initializeApp({
            credential: cert(serviceAccount)
          });

          const db = getFirestore();
          const raw = JSON.parse(fs.readFileSync("assets/data/products.json", "utf8"));
          const products = Array.isArray(raw) ? raw : raw.products;

          if (!Array.isArray(products)) {
            throw new Error("products.json must be a list or an object with a products list");
          }

          async function commitBatch(batch, count, label) {
            if (count > 0) {
              await batch.commit();
              console.log(`Committed ${label}: ${count}`);
            }
          }

          async function main() {
            const collection = db.collection("products");
            const jsonIds = new Set();

            let uploaded = 0;
            let skipped = 0;
            let deleted = 0;

            let batch = db.batch();
            let batchCount = 0;

            for (const rawProduct of products) {
              if (!rawProduct || typeof rawProduct !== "object") continue;

              const id = rawProduct.id;

              if (!id) {
                skipped++;
                continue;
              }

              const docId = String(id);
              jsonIds.add(docId);

              const product = { ...rawProduct };
              delete product.comments;

              const ref = collection.doc(docId);
              batch.set(ref, product, { merge: false });

              uploaded++;
              batchCount++;

              if (batchCount >= 450) {
                await commitBatch(batch, batchCount, "product upload batch");
                batch = db.batch();
                batchCount = 0;
              }
            }

            await commitBatch(batch, batchCount, "final product upload batch");

            const existingSnapshot = await collection.get();

            batch = db.batch();
            batchCount = 0;

            for (const doc of existingSnapshot.docs) {
              if (!jsonIds.has(doc.id)) {
                batch.delete(doc.ref);
                deleted++;
                batchCount++;

                console.log(`Queued delete for removed product: ${doc.id}`);

                if (batchCount >= 450) {
                  await commitBatch(batch, batchCount, "delete batch");
                  batch = db.batch();
                  batchCount = 0;
                }
              }
            }

            await commitBatch(batch, batchCount, "final delete batch");

            console.log(
              `Done. Uploaded: ${uploaded} | Deleted: ${deleted} | Skipped: ${skipped} | Total JSON products: ${products.length}`
            );
          }

          main().catch((err) => {
            console.error("UPLOAD FAILED:");
            console.error(err);
            process.exit(1);
          });
          NODE
  deploy_pages:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: [detect]
    if: needs.detect.outputs.frontend_changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject snippet into frontend HTML files
        shell: bash
        run: |
          set -euo pipefail

          OUT_DIR="${{ env.FRONTEND_DIR }}"
          SNIP_FILE="frontend/components/deploy-inject/head-snippet.html"
          MARK="<!--__INJECTED_FILE_PREFIX__-->"

          if [ ! -d "$OUT_DIR" ]; then
            echo "Frontend folder not found: $OUT_DIR" >&2
            exit 1
          fi

          if [ ! -f "$SNIP_FILE" ]; then
            echo "Snippet file not found: $SNIP_FILE" >&2
            exit 1
          fi

          find "$OUT_DIR" -type f -name "*.html" \
            ! -path "$SNIP_FILE" \
            ! -path "frontend/components/deploy-inject/*" \
            -print0 | while IFS= read -r -d '' f; do

            if grep -qF "$MARK" "$f"; then
              echo "Already injected: $f"
              continue
            fi

            tmp="$(mktemp)"

            if grep -qi '<!DOCTYPE[[:space:]]\+html[[:space:]]*>' "$f"; then
              awk -v snip_file="$SNIP_FILE" -v mark="$MARK" '
                BEGIN {
                  injected = 0
                  while ((getline line < snip_file) > 0) {
                    snip = snip line "\n"
                  }
                  close(snip_file)
                }
                {
                  print $0
                  if (!injected && tolower($0) ~ /<!doctype[[:space:]]+html[[:space:]]*>/) {
                    print mark
                    printf "%s", snip
                    injected = 1
                  }
                }
              ' "$f" > "$tmp"

              mv "$tmp" "$f"
              echo "Injected after <!DOCTYPE html>: $f"
            else
              {
                printf '%s\n' "$MARK"
                cat "$SNIP_FILE"
                printf '\n'
                cat "$f"
              } > "$tmp"

              mv "$tmp" "$f"
              echo "No <!DOCTYPE html>; prepended old way: $f"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy 404 page into published subdirectories
        shell: bash
        run: |
          set -euo pipefail

          OUT_DIR="${{ env.FRONTEND_DIR }}"
          SOURCE_404="${OUT_DIR}/404.html"

          if [ ! -f "$SOURCE_404" ]; then
            echo "404 page not found: $SOURCE_404" >&2
            exit 1
          fi

          find "$OUT_DIR" -type f -name "index.html" -print0 | while IFS= read -r -d '' index_file; do
            target_dir="$(dirname "$index_file")"
            target_404="${target_dir}/404.html"

            if [ "$target_404" = "$SOURCE_404" ]; then
              continue
            fi

            cp "$SOURCE_404" "$target_404"
            echo "Copied 404.html to $target_dir"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ env.FRONTEND_DIR }}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4